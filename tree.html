function display(data){

    const container = document.getElementById("places");

    if(data.length === 0){
        container.innerHTML = "<div class='no-result'>No Places Found</div>";
        return;
    }

    container.innerHTML = "";

    data.forEach(p => {

        container.innerHTML += `
        <div class="card">

            <img src="${p.img}" alt="${p.name}" loading="lazy">

            <div class="card-content">

                <h3>${p.name}</h3>

                <p>${p.desc}</p>

                <p class="price">${p.cost}</p>

                <a class="button" href="${p.hotel}" target="_blank">
                    Hotels
                </a>

                <a class="button" href="${p.food}" target="_blank">
                    Food
                </a>

                <a class="button map-btn"
                href="https://www.google.com/maps/search/${encodeURIComponent(p.name)}"
                target="_blank">
                    Map
                </a>

            </div>

        </div>
        `;
    });
}

display(places);

document.getElementById("search").addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let filtered = places.filter(place =>
        place.name.toLowerCase().includes(value) ||
        place.desc.toLowerCase().includes(value)
    );

    display(filtered);

});
